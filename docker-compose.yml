# Target Ubuntu server (linux/amd64). Remove or set to linux/arm64 for ARM (e.g. Graviton).
services:
  postgres:
    image: postgres:15-alpine
    platform: linux/amd64
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blogedit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-blogedit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      DATABASE_DSN: host=postgres user=${POSTGRES_USER:-blogedit} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB:-blogedit} port=5432 sslmode=disable TimeZone=UTC
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (min 32 chars)}
      GIN_MODE: release
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    platform: linux/amd64
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
